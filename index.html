<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yen-Chia's Colorful World</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4, #fbc2eb);
      color: #333;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 3em;
      color: #ff5e57;
      animation: rainbow 3s infinite alternate;
    }

    p {
      font-size: 1.5em;
      margin-top: 20px;
    }

    a {
      display: inline-block;
      margin: 15px;
      padding: 10px 20px;
      background-color: #fff;
      color: #333;
      text-decoration: none;
      border-radius: 10px;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: #ff5e57;
      color: white;
    }

    @keyframes rainbow {
      0% { color: #ff5e57; }
      50% { color: #f9ca24; }
      100% { color: #6ab04c; }
    }
  </style>
</head>
<body>
  <h1>Welcome to Yen-Chia's World 🌈</h1>
  <p>Hi! I'm Yen-Chia, and this is my colorful little corner of the internet.</p>

  <a href="https://github.com/yourusername" target="_blank">My GitHub</a>
  <a href="https://www.instagram.com/" target="_blank">Instagram</a>
  <a href="#projects">My Projects</a>
</body>
</html>
